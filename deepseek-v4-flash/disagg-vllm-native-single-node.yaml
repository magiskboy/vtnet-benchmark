---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-dept-serving

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsv4-vllm-prefill
  namespace: ai-dept-serving
  labels:
    app: dsv4-vllm-prefill
    benchmark.kvcache/stack: deepseek-v4-flash-vllm-disagg-native-single-node
spec:
  replicas: 1
  selector:
    matchLabels: { app: dsv4-vllm-prefill }
  template:
    metadata:
      labels: { app: dsv4-vllm-prefill }
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      hostIPC: true
      nodeName: hla9104p1-escn8-smt-hgx47
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.22.0
          ports: [{ containerPort: 8000 }]
          env:
            - { name: VLLM_USE_DEEP_GEMM, value: "1" }
            - { name: TILELANG_CLEANUP_TEMP_FILES, value: "1" }
            - { name: VLLM_DISABLE_COMPILE_CACHE, value: "1" }
            - { name: VLLM_ENGINE_READY_TIMEOUT_S, value: "3600" }
            - { name: VLLM_RPC_TIMEOUT, value: "600000" }
            - { name: VLLM_LOG_STATS_INTERVAL, value: "1" }
            - { name: VLLM_NIXL_SIDE_CHANNEL_PORT, value: "5557" }
            - name: VLLM_NIXL_SIDE_CHANNEL_HOST
              valueFrom: { fieldRef: { fieldPath: status.hostIP } }
            - { name: UCX_TLS, value: "rc_x,rc,dc_x,dc,cuda_copy,cuda_ipc" }
            - { name: UCX_RNDV_SCHEME, value: get_zcopy }
            - { name: UCX_RNDV_THRESH, value: "0" }
            - { name: UCX_IB_REG_METHODS, value: "odp,rcache" }
            - { name: UCX_IB_ADDR_TYPE, value: eth }
            - { name: UCX_NET_DEVICES, value: "mlx5_0:1" }
            - { name: UCX_IB_GID_INDEX, value: "0" }
            - { name: NCCL_IB_DISABLE, value: "0" }
            - { name: NCCL_P2P_LEVEL, value: NVL }
            - { name: NCCL_DEBUG, value: ERROR }
          command: [/bin/bash, -lc]
          args:
            - |
              set -euo pipefail
              exec vllm serve \
                /mnt/models/hf/DeepSeek-V4-Flash-Base \
                --served-model-name deepseek-ai/DeepSeek-V4-Flash-Base \
                --trust-remote-code \
                --kv-cache-dtype fp8_e4m3 \
                --quantization fp8 \
                --block-size 256 \
                --port 8000 \
                --data-parallel-size 4 \
                --enable-expert-parallel \
                --enable-sleep-mode \
                --max-num-seqs 8 \
                --tokenizer-mode deepseek_v4 \
                --tool-call-parser deepseek_v4 \
                --enable-auto-tool-choice \
                --reasoning-parser deepseek_v4 \
                --max-model-len 128000 \
                --max-num-batched-tokens 32768 \
                --gpu-memory-utilization 0.85 \
                --no-disable-hybrid-kv-cache-manager \
                --disable-uvicorn-access-log \
                --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_producer","kv_load_failure_policy":"fail"}' \
                --enable-auto-tool-choice
          volumeMounts:
            - { name: models, mountPath: /mnt/models }
          resources:
            requests:
              nvidia.com/gpu: "4"
              cpu: "32"
              memory: 768Gi
              ephemeral-storage: 100Gi
              rdma/rdma_shared_devices_ib: "4"
            limits:
              nvidia.com/gpu: "4"
              cpu: "32"
              memory: 768Gi
              rdma/rdma_shared_devices_ib: "4"
      volumes:
        - { name: models, hostPath: { path: /mnt/models, type: Directory } }

---
apiVersion: v1
kind: Service
metadata:
  name: dsv4-vllm-prefill
  namespace: ai-dept-serving
spec:
  selector: { app: dsv4-vllm-prefill }
  ports:
    - { name: dp0, port: 8000, targetPort: 8000 }
    - { name: dp1, port: 8001, targetPort: 8001 }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsv4-vllm-decode
  namespace: ai-dept-serving
  labels:
    app: dsv4-vllm-decode
    benchmark.kvcache/stack: deepseek-v4-flash-vllm-disagg-native-single-node
spec:
  replicas: 1
  selector:
    matchLabels: { app: dsv4-vllm-decode }
  template:
    metadata:
      labels: { app: dsv4-vllm-decode }
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      hostIPC: true
      nodeName: hla9104p1-escn8-smt-hgx47
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.22.0
          ports: [{ containerPort: 8004 }]
          env:
            - { name: VLLM_USE_DEEP_GEMM, value: "1" }
            - { name: TILELANG_CLEANUP_TEMP_FILES, value: "1" }
            - { name: VLLM_DISABLE_COMPILE_CACHE, value: "1" }
            - { name: VLLM_ENGINE_READY_TIMEOUT_S, value: "3600" }
            - { name: VLLM_RPC_TIMEOUT, value: "600000" }
            - { name: VLLM_LOG_STATS_INTERVAL, value: "1" }
            - { name: VLLM_NIXL_SIDE_CHANNEL_PORT, value: "5559" }
            - name: VLLM_NIXL_SIDE_CHANNEL_HOST
              valueFrom: { fieldRef: { fieldPath: status.hostIP } }
            - { name: UCX_TLS, value: "rc_x,rc,dc_x,dc,cuda_copy,cuda_ipc" }
            - { name: UCX_RNDV_SCHEME, value: get_zcopy }
            - { name: UCX_RNDV_THRESH, value: "0" }
            - { name: UCX_IB_REG_METHODS, value: "odp,rcache" }
            - { name: UCX_IB_ADDR_TYPE, value: eth }
            - { name: UCX_NET_DEVICES, value: "mlx5_0:1" }
            - { name: UCX_IB_GID_INDEX, value: "0" }
            - { name: NCCL_IB_DISABLE, value: "0" }
            - { name: NCCL_P2P_LEVEL, value: NVL }
            - { name: NCCL_DEBUG, value: ERROR }
          command: [/bin/bash, -lc]
          args:
            - |
              set -euo pipefail
              exec vllm serve \
                /mnt/models/hf/DeepSeek-V4-Flash-Base \
                --served-model-name deepseek-ai/DeepSeek-V4-Flash-Base \
                --trust-remote-code \
                --kv-cache-dtype fp8_e4m3 \
                --quantization fp8 \
                --block-size 256 \
                --port 8004 \
                --data-parallel-size 4 \
                --enable-expert-parallel \
                --tokenizer-mode deepseek_v4 \
                --tool-call-parser deepseek_v4 \
                --enable-auto-tool-choice \
                --reasoning-parser deepseek_v4 \
                --max-model-len 128000 \
                --max-num-seqs 1536 \
                --max-num-batched-tokens 1536 \
                --max-cudagraph-capture-size 1536 \
                --gpu-memory-utilization 0.85 \
                --compilation-config '{"cudagraph_mode":"FULL_DECODE_ONLY"}' \
                --no-disable-hybrid-kv-cache-manager \
                --enable-sleep-mode \
                --disable-uvicorn-access-log \
                --enable-auto-tool-choice \
                --kv-transfer-config '{"kv_connector":"NixlConnector","kv_role":"kv_consumer","kv_load_failure_policy":"fail"}'
          volumeMounts:
            - { name: models, mountPath: /mnt/models }
          resources:
            requests:
              nvidia.com/gpu: "4"
              cpu: "32"
              memory: 256Gi
              ephemeral-storage: 100Gi
              rdma/rdma_shared_devices_ib: "4"
            limits:
              nvidia.com/gpu: "4"
              cpu: "32"
              memory: 256Gi
              rdma/rdma_shared_devices_ib: "4"
      volumes:
        - { name: models, hostPath: { path: /mnt/models, type: Directory } }

---
apiVersion: v1
kind: Service
metadata:
  name: dsv4-vllm-decode
  namespace: ai-dept-serving
spec:
  selector: { app: dsv4-vllm-decode }
  ports:
    - { name: dp0, port: 8004, targetPort: 8004 }
    - { name: dp1, port: 8005, targetPort: 8005 }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsv4-vllm-router
  namespace: ai-dept-serving
  labels:
    app: dsv4-vllm-router
    benchmark.kvcache/stack: deepseek-v4-flash-vllm-disagg-native-single-node
spec:
  replicas: 1
  selector:
    matchLabels: { app: dsv4-vllm-router }
  template:
    metadata:
      labels: { app: dsv4-vllm-router }
    spec:
      nodeName: hla9104p1-escn8-smt-hgx47
      containers:
        - name: router
          image: vllm/vllm-openai:v0.22.0
          ports: [{ containerPort: 8000 }]
          command: [bash, -lc]
          args:
            - |
              pip install -q vllm-router && exec vllm-router \
                --policy consistent_hash \
                --vllm-pd-disaggregation \
                --kv-connector nixl \
                --prefill http://dsv4-vllm-prefill:8000 \
                --decode http://dsv4-vllm-decode:8004 \
                --host 0.0.0.0 \
                --port 8000 \
                --intra-node-data-parallel-size 2
          resources:
            requests: { cpu: "4", memory: 8Gi }
            limits:   { cpu: "8", memory: 16Gi }

---
apiVersion: v1
kind: Service
metadata:
  name: llm-bench-frontend
  namespace: ai-dept-serving
spec:
  selector: { app: dsv4-vllm-router }
  ports: [{ port: 8000, targetPort: 8000 }]
