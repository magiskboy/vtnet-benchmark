---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-dept-serving

---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: gpt-oss-vllm
  namespace: ai-dept-serving
  labels:
    app.kubernetes.io/part-of: dynamo-agg-vllm
    benchmark.kvcache/stack: vllm-agg-native
spec:
  services:
    frontend:
      componentType: frontend
      replicas: 1
      envs:
        - { name: DYN_ROUTER_MODE, value: kv }
        - { name: DYN_KV_CACHE_BLOCK_SIZE, value: "32" }
        - { name: PYTHONHASHSEED, value: "0" }
      resources:
        requests: { cpu: "8", memory: 64Gi }
        limits:   { cpu: "8", memory: 64Gi }
      extraPodSpec:
        volumes:
          - { name: models, hostPath: { path: /mnt/models, type: Directory } }
        nodeName: hla9104p1-escn8-smt-hgx47
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          volumeMounts:
            - { name: models, mountPath: /mnt/models }
          command: [python3, -m, dynamo.frontend]
          args:
            - --http-port
            - "8000"
            - --router-mode
            - kv
            - --model-path
            - /mnt/models/hf/gpt-oss-120b
            - --model-name
            - openai/gpt-oss-120b

    worker:
      componentType: worker
      replicas: 1
      sharedMemory:
        size: 80Gi
      resources:
        requests:
          gpu: "8"
          cpu: "64"
          memory: 1792Gi
          custom: { ephemeral-storage: 100Gi }
        limits:
          gpu: "8"
          cpu: "64"
          memory: 1792Gi
      envs:
        - { name: PYTHONHASHSEED, value: "0" }
        - { name: NCCL_IB_DISABLE, value: "0" }
        - { name: NCCL_P2P_LEVEL, value: NVL }
        - { name: NCCL_DEBUG, value: ERROR }
      extraPodSpec:
        nodeName: hla9104p1-escn8-smt-hgx47
        volumes:
          - { name: models, hostPath: { path: /mnt/models, type: Directory } }
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.1.1
          volumeMounts:
            - { name: models, mountPath: /mnt/models }
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - /mnt/models/hf/gpt-oss-120b
            - --served-model-name
            - openai/gpt-oss-120b
            - --tensor-parallel-size
            - "8"
            - --max-model-len
            - "128000"
            - --max-num-batched-tokens
            - "65536"
            - --max-num-seqs
            - "512"
            - --gpu-memory-utilization
            - "0.85"
            - --enable-chunked-prefill
            - --enable-prefix-caching
            - --trust-remote-code
            - --dyn-reasoning-parser
            - gpt_oss
            - --dyn-tool-call-parser
            - harmony
